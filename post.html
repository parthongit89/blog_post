{% extends "layout.html" %}
{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Capriola&amp;family=SN+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-bright": "#f8f9ff", "on-primary": "#ffffff", "on-secondary-fixed": "#001a42",
                    "inverse-primary": "#bec6e0", "outline-variant": "#c6c6cd", "on-surface": "#0b1c30",
                    "surface-container-high": "#dce9ff", "on-tertiary": "#ffffff", "inverse-surface": "#213145",
                    "error-container": "#ffdad6", "surface": "#f8f9ff", "secondary-container": "#2170e4",
                    "surface-tint": "#565e74", "on-secondary-container": "#fefcff", "on-surface-variant": "#45464d",
                    "error": "#ba1a1a", "tertiary": "#000000", "surface-container-low": "#eff4ff",
                    "on-primary-container": "#7c839b", "surface-variant": "#d3e4fe", "on-secondary-fixed-variant": "#004395",
                    "secondary-fixed-dim": "#adc6ff", "primary-fixed": "#dae2fd", "on-primary-fixed": "#131b2e",
                    "surface-container": "#e5eeff", "on-error-container": "#93000a", "surface-container-highest": "#d3e4fe",
                    "surface-container-lowest": "#ffffff", "on-tertiary-fixed": "#191c1e", "tertiary-container": "#191c1e",
                    "primary-fixed-dim": "#bec6e0", "on-primary-fixed-variant": "#3f465c", "surface-dim": "#cbdbf5",
                    "tertiary-fixed-dim": "#c4c7c9", "primary": "#000000", "on-tertiary-container": "#818486",
                    "on-tertiary-fixed-variant": "#444749", "secondary-fixed": "#d8e2ff", "tertiary-fixed": "#e0e3e5",
                    "on-secondary": "#ffffff", "on-background": "#0b1c30", "on-error": "#ffffff",
                    "inverse-on-surface": "#eaf1ff", "outline": "#76777d", "primary-container": "#131b2e",
                    "background": "#f8f9ff", "secondary": "#0058be"
            },
            "borderRadius": { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
            "spacing": { "gutter": "24px", "unit": "4px", "max-width": "1280px", "margin-mobile": "20px", "margin-desktop": "64px" },
            "fontFamily": {
                    "body-md": ["SN Pro"], "label-sm": ["SN Pro"], "headline-lg": ["Capriola"], "headline-xl-mobile": ["Capriola"],
                    "body-sm": ["SN Pro"], "headline-md": ["Capriola"], "headline-xl": ["Capriola"], "body-lg": ["SN Pro"], "label-md": ["SN Pro"]
            },
            "fontSize": {
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}], "label-sm": ["12px", {"lineHeight": "1", "fontWeight": "500"}],
                    "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "400"}],
                    "headline-xl-mobile": ["36px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "400"}],
                    "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}], "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "400"}],
                    "headline-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}], "label-md": ["14px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #f8f9ff; -webkit-font-smoothing: antialiased; }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
</style>

<main class="max-w-3xl mx-auto px-margin-mobile md:px-margin-desktop py-32 min-h-screen font-body-md text-on-surface fade-in">
    <article class="space-y-10">
        
        <div class="space-y-6 border-b border-outline-variant/50 pb-8">
            <h1 class="text-4xl md:text-5xl font-headline-xl text-primary tracking-tight leading-tight">{{ post.title }}</h1>
            
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 text-body-sm text-on-surface-variant">
                <div class="flex items-center gap-2">
                    <span class="font-semibold text-primary">By {{ post.author.username }}</span>
                    <span class="opacity-40">•</span>
                    <span>{{ post.date_posted.strftime('%B %d, %Y') if post.date_posted.strftime else post.date_posted }}</span>
                </div>

                {% if post.author == current_user %}
                    <div class="flex items-center space-x-6">
                        <a href="{{ url_for('update_post', post_id=post.id) }}" class="text-secondary hover:opacity-80 flex items-center gap-1 font-label-md text-label-md uppercase tracking-wider transition-opacity">
                            <span class="material-symbols-outlined text-[18px]">edit</span>Edit Post
                        </a>
                        
                        <form action="{{ url_for('delete_post', post_id=post.id) }}" method="POST" onsubmit="return confirm('Are you absolutely sure you want to delete this post permanently?');" class="inline">
                            <button type="submit" class="text-error hover:opacity-80 flex items-center gap-1 font-label-md text-label-md uppercase tracking-wider transition-opacity cursor-pointer">
                                <span class="material-symbols-outlined text-[18px]">delete</span>Delete
                            </button>
                        </form>
                    </div>
                {% endif %}
            </div>
        </div>

        <div class="w-full aspect-video rounded-xl overflow-hidden bg-surface-container-low border border-outline-variant/30 shadow-sm">
            <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1200" class="w-full h-full object-cover">
        </div>

        <div class="text-body-lg text-on-surface/90 leading-relaxed font-body-lg whitespace-pre-wrap pt-4 tracking-normal">
            {{ post.content }}
        </div>

    </article>
</main>

<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-surface-container-highest rounded-full blur-[120px] opacity-30 -z-10 pointer-events-none"></div>
<div class="fixed bottom-[-5%] right-[-5%] w-[30%] h-[30%] bg-secondary-container rounded-full blur-[100px] opacity-5 -z-10 pointer-events-none"></div>
{% endblock content %}
